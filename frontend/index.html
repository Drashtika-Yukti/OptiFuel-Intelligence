<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiFuel Intelligence | Enterprise Dashboard</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #map { height: 100vh; width: 100%; z-index: 0; }
        .sidebar { width: 400px; z-index: 10; height: 100vh; position: absolute; left: 0; top: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .stop-card:hover { transform: translateX(5px); transition: 0.2s; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Main Sidebar -->
    <div class="sidebar glass flex flex-col p-6 shadow-2xl">
        <div class="flex items-center gap-3 mb-8">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fas fa-gas-pump text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">OptiFuel <span class="text-blue-500">Intelligence</span></h1>
        </div>

        <!-- Input Section -->
        <div class="space-y-4 mb-8">
            <div>
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Origin</label>
                <div class="relative mt-1">
                    <i class="fas fa-location-dot absolute left-3 top-3 text-gray-500"></i>
                    <input id="startNode" type="text" placeholder="e.g. New York, NY" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Destination</label>
                <div class="relative mt-1">
                    <i class="fas fa-flag-checkered absolute left-3 top-3 text-gray-500"></i>
                    <input id="endNode" type="text" placeholder="e.g. Houston, TX" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
            </div>

            <!-- Advanced Config Toggle -->
            <button onclick="toggleAdvanced()" class="text-xs text-blue-400 hover:text-blue-300 transition flex items-center gap-2">
                <i class="fas fa-sliders"></i> Vehicle Configuration
            </button>

            <div id="advancedConfig" class="hidden space-y-4 pt-2">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-semibold text-gray-400 uppercase">MPG</label>
                        <input id="mpg" type="number" value="10" class="w-full bg-slate-800 border border-slate-700 rounded py-1 px-2 text-xs">
                    </div>
                    <div>
                        <label class="text-[10px] font-semibold text-gray-400 uppercase">Range (mi)</label>
                        <input id="capacity" type="number" value="500" class="w-full bg-slate-800 border border-slate-700 rounded py-1 px-2 text-xs">
                    </div>
                </div>
            </div>

            <button onclick="calculateRoute()" id="calcBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition shadow-lg flex items-center justify-center gap-2">
                <span>Optimize Strategy</span>
                <i class="fas fa-bolt"></i>
            </button>
        </div>

        <!-- Results Section -->
        <div id="results" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                    <p class="text-[10px] text-gray-400 uppercase">Total Distance</p>
                    <p id="resDist" class="text-lg font-bold text-white">0 mi</p>
                </div>
                <div class="bg-blue-900/20 p-3 rounded-xl border border-blue-500/30">
                    <p class="text-[10px] text-blue-400 uppercase">Total Cost</p>
                    <p id="resCost" class="text-lg font-bold text-blue-400">$0.00</p>
                </div>
            </div>

            <h3 class="text-xs font-semibold text-gray-400 uppercase mb-3 flex items-center gap-2">
                <i class="fas fa-list-ol"></i> Optimized Stops
            </h3>
            <div id="stopList" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                <!-- Stops go here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-center px-6">
            <div class="bg-slate-800 rounded-full p-6 mb-4">
                <i class="fas fa-map-marked-alt text-4xl text-slate-600"></i>
            </div>
            <p class="text-gray-400 text-sm">Enter a route to begin strategic fuel optimization.</p>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Loading Overlay -->
    <div id="loader" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <h2 class="text-xl font-semibold text-white">Calculating Optimal Path...</h2>
        <p class="text-gray-400 text-sm">Scanning 10,000+ fuel stations across the USA</p>
    </div>

    <script src="/frontend/app.js"></script>
</body>
</html>
